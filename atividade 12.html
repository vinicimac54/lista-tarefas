<html>
<body>
<script>

let tarefas = []
let parar = "não"
function adicionarTarefa() { 
    let numTar = +prompt("Insira o numero de tarefas que deseja adicionar")
    let i = 0;
    while (i < numTar) { 
    let tarAd = prompt("Insira a tarefa desejada ou parar se desejar sair");
    if (tarAd.toLowerCase() === "parar"){
        i = numTar
    } else{
       tarefas.push(tarAd) 
       i++
    }}      
}

function removerTarefa() { 
    let tarRe = prompt("Insira a tarefa que deseja remover")
    let tarIndex = tarefas.indexOf(tarRe)
    tarefas.splice(tarIndex, 1)
}

while(parar.toLowerCase() !== "sim" ){
let opTar = prompt(`Digite "adicionar" para adicionar uma ou mais tarefas, "remover" para remover uma tarefa ou "remover tudo" para remover todas as tarefas`)
if(opTar.toLowerCase() === "adicionar"){
    adicionarTarefa()
    console.log(`Tarefas adicionadas. Agora a lista é: ${tarefas}`)
} else if(opTar.toLowerCase() === "remover"){
    removerTarefa()
    console.log(`Tarefa removida. Agora a lista é: ${tarefas}`)
} else if(opTar.toLowerCase() === "remover tudo"){
    for(let y = tarefas.length - 1;  y >= 0; y--){
    tarefas.splice(y, 1)    
    }
    console.log(`Todas as tarefas foram removidas`)
}
 parar = prompt("Deseja parar?")


}

</script>
</body>
</html>
